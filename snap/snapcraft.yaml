name: vessel-browser
title: Vessel Browser
adopt-info: vessel
base: core22
summary: AI-native web browser for Linux
contact: hello@quantaintellect.com
license: MIT
website: https://github.com/unmodeled-tyler/quanta-vessel-browser
source-code: https://github.com/unmodeled-tyler/quanta-vessel-browser
issues: https://github.com/unmodeled-tyler/quanta-vessel-browser/issues
donation: https://github.com/sponsors/unmodeled-tyler
description: |
  Vessel is an AI-native web browser — a persistent browser runtime for
  autonomous agents with human supervision. Built on Electron and SolidJS,
  it provides MCP (Model Context Protocol) integration for AI agent
  browser automation.
grade: stable
confinement: strict
icon: snap/gui/vessel-icon.png

architectures:
  - build-on: amd64

plugs:
  browser-support:
    interface: browser-support
    allow-sandbox: false

apps:
  vessel-browser:
    command: vessel --no-sandbox --disable-setuid-sandbox
    desktop: snap/gui/vessel-browser.desktop
    extensions: [gnome]
    environment:
      ELECTRON_DISABLE_SANDBOX: "1"
    plugs:
      - network
      - network-bind
      - browser-support
      - opengl
      - audio-playback
      - home
      - removable-media
      - cups

parts:
  vessel:
    plugin: dump
    source: dist/linux-unpacked
    source-type: local
    override-pull: |
      craftctl default
      craftctl set version="${VESSEL_VERSION:-0.1.0}"
    override-build: |
      craftctl default
      chmod +x $CRAFT_PART_INSTALL/vessel
    stage-packages:
      - libnotify4
      - libsecret-1-0
