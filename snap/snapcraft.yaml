name: vessel-browser
adopt-info: vessel
base: core22
summary: AI-native web browser for Linux
description: |
  Vessel is an AI-native web browser — a persistent browser runtime for
  autonomous agents with human supervision. Built on Electron and SolidJS,
  it provides MCP (Model Context Protocol) integration for AI agent
  browser automation.
grade: stable
confinement: strict
icon: snap/gui/vessel-icon.png

architectures:
  - build-on: amd64

plugs:
  browser-support:
    interface: browser-support
    allow-sandbox: false

apps:
  vessel-browser:
    command: vessel --no-sandbox --disable-setuid-sandbox
    desktop: snap/gui/vessel-browser.desktop
    extensions: [gnome]
    environment:
      ELECTRON_DISABLE_SANDBOX: "1"
    plugs:
      - network
      - network-bind
      - browser-support
      - opengl
      - audio-playback
      - home
      - removable-media
      - cups

parts:
  vessel:
    plugin: dump
    source: .
    source-type: local
    build-snaps:
      - node/22/stable
    override-pull: |
      craftctl default
      craftctl set version="${VESSEL_VERSION:-0.1.0}"
    override-build: |
      export PATH="/snap/node/current/bin:$PATH"
      npm ci
      npm run build
      npx electron-builder --config electron-builder.config.cjs --linux dir --publish never
      cp -r dist/linux-unpacked/* $CRAFT_PART_INSTALL/
    stage-packages:
      - libnotify4
      - libsecret-1-0
