app-id: ai.vessel.browser
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "24.08"
command: vessel
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: vessel-browser
    buildsystem: simple
    build-commands:
      - install -Dm755 vessel /app/bin/vessel
      - install -Dm644 ai.vessel.browser.desktop /app/share/applications/ai.vessel.browser.desktop
      - install -Dm644 ai.vessel.browser.metainfo.xml /app/share/metainfo/ai.vessel.browser.metainfo.xml
      - install -Dm644 vessel-icon.png /app/share/icons/hicolor/256x256/apps/ai.vessel.browser.png
      - cp -r resources/* /app/resources/
    sources:
      - type: archive
        url: https://github.com/unmodeled-tyler/quanta-vessel-browser/releases/download/vVERSION/Vessel-VERSION-amd64.AppImage
        sha256: PLACEHOLDER_SHA256
        dest-filename: vessel.AppImage
      - type: file
        path: ai.vessel.browser.desktop
      - type: file
        path: ai.vessel.browser.metainfo.xml
      - type: file
        url: https://raw.githubusercontent.com/unmodeled-tyler/quanta-vessel-browser/main/resources/vessel-icon.png
        sha256: PLACEHOLDER_ICON_SHA256
