name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── Determine version (shared by all jobs) ──
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            version="${GIT_REF#refs/tags/v}"
          else
            pkg_version=$(node -p "require('./package.json').version")
            latest_patch=$(git tag --list "v${pkg_version%.*}.*" --sort=-version:refname | head -1 | sed 's/^v//')
            if [ -z "$latest_patch" ]; then
              version="$pkg_version"
            else
              major_minor="${latest_patch%.*}"
              patch="${latest_patch##*.}"
              version="${major_minor}.$((patch + 1))"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $version"

      - name: Create tag if needed
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  # ── Linux AppImage ──
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Smoke test
        run: xvfb-run -a npm run smoke:test

      - name: Sync package version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build & package
        run: npm run build && npx electron-builder --linux --publish never

      - name: Generate checksums
        run: sha256sum dist/*.AppImage > dist/SHASUMS256-linux.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dist/*.AppImage
            dist/SHASUMS256-linux.txt

  # ── Windows NSIS installer ──
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Sync package version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: npm version "$env:VERSION" --no-git-tag-version --allow-same-version

      - name: Build & package
        run: npm run build && npx electron-builder --win --publish never

      - name: Generate checksums
        shell: bash
        run: sha256sum dist/*-setup.exe > dist/SHASUMS256-win.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/*-setup.exe
            dist/SHASUMS256-win.txt

  # ── Publish (runs after both platforms succeed) ──
  publish:
    needs: [version, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist-linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist-windows

      - name: Merge checksums
        run: cat dist-linux/SHASUMS256-linux.txt dist-windows/SHASUMS256-win.txt > SHASUMS256.txt

      - name: Sync package.json version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist-linux/*.AppImage
            dist-windows/*-setup.exe
            SHASUMS256.txt

      - name: Publish Windows installers to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ vars.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail

          if [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${R2_BUCKET:-}" ]; then
            echo "Cloudflare R2 is not configured. Set CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_R2_ACCESS_KEY_ID, CLOUDFLARE_R2_SECRET_ACCESS_KEY, CLOUDFLARE_R2_BUCKET, and optionally CLOUDFLARE_R2_PUBLIC_BASE_URL."
            exit 1
          fi

          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          version_prefix="downloads/windows/${VERSION}"
          latest_prefix="downloads/windows/latest"

          shopt -s nullglob
          windows_files=(dist-windows/*-setup.exe dist-windows/SHASUMS256-win.txt)
          if [ "${#windows_files[@]}" -eq 0 ]; then
            echo "No Windows release artifacts found to upload."
            exit 1
          fi

          for file in "${windows_files[@]}"; do
            name="$(basename "$file")"
            aws s3 cp "$file" "s3://${R2_BUCKET}/${version_prefix}/${name}" --endpoint-url "$endpoint"
            aws s3 cp "$file" "s3://${R2_BUCKET}/${latest_prefix}/${name}" --endpoint-url "$endpoint"
          done

          if [ -n "${R2_PUBLIC_BASE_URL:-}" ]; then
            base_url="${R2_PUBLIC_BASE_URL%/}"
            {
              echo "## Cloudflare R2 Uploads"
              echo
              echo "Store-safe versioned URLs:"
              for file in "${windows_files[@]}"; do
                name="$(basename "$file")"
                echo "- ${base_url}/${version_prefix}/${name}"
              done
              echo
              echo "Mutable latest URLs:"
              for file in "${windows_files[@]}"; do
                name="$(basename "$file")"
                echo "- ${base_url}/${latest_prefix}/${name}"
              done
              echo
              echo "Use the versioned installer URL in Microsoft Partner Center, not the latest alias."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
