name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── Determine version (shared by all jobs) ──
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            version="${GIT_REF#refs/tags/v}"
          else
            pkg_version=$(node -p "require('./package.json').version")
            latest_patch=$(git tag --list "v${pkg_version%.*}.*" --sort=-version:refname | head -1 | sed 's/^v//')
            if [ -z "$latest_patch" ]; then
              version="$pkg_version"
            else
              major_minor="${latest_patch%.*}"
              patch="${latest_patch##*.}"
              version="${major_minor}.$((patch + 1))"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $version"

      - name: Create tag if needed
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  # ── Linux AppImage ──
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Smoke test
        run: xvfb-run -a npm run smoke:test

      - name: Build & package
        run: npm run build && npx electron-builder --linux --publish never

      - name: Generate checksums
        run: sha256sum dist/*.AppImage > dist/SHASUMS256-linux.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dist/*.AppImage
            dist/SHASUMS256-linux.txt

  # ── Windows NSIS installer ──
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Build & package
        run: npm run build && npx electron-builder --win --publish never

      - name: Generate checksums
        shell: bash
        run: sha256sum dist/*-setup.exe > dist/SHASUMS256-win.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/*-setup.exe
            dist/SHASUMS256-win.txt

  # ── Publish (runs after both platforms succeed) ──
  publish:
    needs: [version, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist-linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist-windows

      - name: Merge checksums
        run: cat dist-linux/SHASUMS256-linux.txt dist-windows/SHASUMS256-win.txt > SHASUMS256.txt

      - name: Sync package.json version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist-linux/*.AppImage
            dist-windows/*-setup.exe
            SHASUMS256.txt
