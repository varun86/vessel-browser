name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  linux-appimage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            version="${GIT_REF#refs/tags/v}"
          else
            pkg_version=$(node -p "require('./package.json').version")
            latest_patch=$(git tag --list "v${pkg_version%.*}.*" --sort=-version:refname | head -1 | sed 's/^v//')
            if [ -z "$latest_patch" ]; then
              version="$pkg_version"
            else
              major_minor="${latest_patch%.*}"
              patch="${latest_patch##*.}"
              version="${major_minor}.$((patch + 1))"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $version"

      - name: Create tag if needed
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: xvfb-run -a npm run smoke:test

      - name: Build AppImage
        run: npm run dist

      - name: Generate checksums
        run: sha256sum dist/*.AppImage > dist/SHASUMS256.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vessel-linux-appimage
          path: |
            dist/*.AppImage
            dist/SHASUMS256.txt

      - name: Sync package.json version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/*.AppImage
            dist/SHASUMS256.txt
