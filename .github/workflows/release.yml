name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  linux-appimage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: xvfb-run -a npm run smoke:test

      - name: Build AppImage
        run: npm run dist

      - name: Generate checksums
        run: sha256sum dist/*.AppImage > dist/SHASUMS256.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vessel-linux-appimage
          path: |
            dist/*.AppImage
            dist/SHASUMS256.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/SHASUMS256.txt
