name: Promote Dev To Main

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Check whether dev is ahead of main
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ahead_by=$(gh api repos/${{ github.repository }}/compare/main...dev --jq '.ahead_by')
          echo "ahead_by=$ahead_by" >> "$GITHUB_OUTPUT"

          if [ "$ahead_by" = "0" ]; then
            echo "No new commits to promote from dev to main."
          fi

      - name: Merge dev into main
        if: steps.compare.outputs.ahead_by != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/merges \
            -f base=main \
            -f head=dev \
            -f commit_message="Promote dev to main (automated daily merge)"

      - name: Trigger release workflow
        if: steps.compare.outputs.ahead_by != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref main
