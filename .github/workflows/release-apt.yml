name: Release APT

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3). Defaults to latest tag."
        required: false

jobs:
  apt:
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GITHUB_REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag=$(gh api "repos/${REPO}/tags?per_page=100" --paginate --jq '.[].name' | grep '^v' | sort -V | tail -n 1)
          fi
          tag="${tag#refs/tags/}"
          [[ "$tag" == v* ]] || tag="v$tag"
          version="${tag#v}"
          echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check out vessel-browser
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json', 'electron-builder.config.cjs') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: xvfb-run -a npm run smoke:test

      - name: Sync package version
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build deb package
        run: npm run build && bash scripts/ci-electron-builder.sh --config electron-builder.config.cjs --linux deb --publish never

      - name: Check out website repo
        uses: actions/checkout@v4
        with:
          repository: unmodeled-tyler/quanta-intellect-website
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          path: website

      - name: Set up APT repo structure
        run: |
          mkdir -p website/apt/pool/stable
          mkdir -p website/apt/dists/stable/main/binary-amd64

      - name: Copy deb to pool
        run: cp dist/*.deb website/apt/pool/stable/

      - name: Prune old versions (keep latest 5)
        run: |
          cd website/apt/pool/stable
          ls -t *.deb | tail -n +6 | xargs -r rm -f

      - name: Import GPG key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"

      - name: Generate APT repo metadata
        run: |
          cd website/apt

          # Generate Packages index
          dpkg-scanpackages --arch amd64 pool/stable > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          # Generate Release file
          cd dists/stable
          apt-ftparchive release . > Release

          # Sign Release file (key has no passphrase)
          gpg --batch --yes --default-key "$GPG_KEY_ID" -abs -o Release.gpg Release
          gpg --batch --yes --default-key "$GPG_KEY_ID" --clearsign -o InRelease Release

      - name: Push updated APT repo to website
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apt/
          if git diff --cached --quiet; then
            echo "APT repo already up to date for v${VERSION}"
            exit 0
          fi
          git commit -m "apt: publish Vessel v${VERSION}"
          git push
