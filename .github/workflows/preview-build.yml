name: Preview Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: preview-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linux AppImage ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json', 'electron-builder.config.cjs') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - run: npm ci
      - name: Smoke test
        run: xvfb-run -a npm run smoke:test

      - name: Build & package
        run: npm run build && bash scripts/ci-electron-builder.sh --config electron-builder.config.cjs --linux --publish never

      - name: Generate checksums
        run: sha256sum dist/*.AppImage > dist/SHASUMS256-linux.txt

      - uses: actions/upload-artifact@v4
        with:
          name: vessel-preview-linux
          retention-days: 14
          path: |
            dist/*.AppImage
            dist/SHASUMS256-linux.txt

  # ── Windows NSIS installer ──
  build-windows:
    runs-on: windows-latest
    env:
      WINDOWS_REQUIRE_CODE_SIGNING: ${{ vars.WINDOWS_REQUIRE_CODE_SIGNING_PREVIEW }}
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      WINDOWS_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.WINDOWS_TRUSTED_SIGNING_ACCOUNT_NAME }}
      WINDOWS_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.WINDOWS_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
      WINDOWS_TRUSTED_SIGNING_ENDPOINT: ${{ vars.WINDOWS_TRUSTED_SIGNING_ENDPOINT }}
      WINDOWS_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ vars.WINDOWS_TRUSTED_SIGNING_PUBLISHER_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci
      - name: Validate Windows signing configuration for signed preview builds
        if: env.WINDOWS_REQUIRE_CODE_SIGNING == 'true'
        shell: pwsh
        run: |
          $hasPfxSigning = [bool]$env:CSC_LINK -and [bool]$env:CSC_KEY_PASSWORD
          $hasTrustedSigning =
            [bool]$env:WINDOWS_TRUSTED_SIGNING_ACCOUNT_NAME -and
            [bool]$env:WINDOWS_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME -and
            [bool]$env:WINDOWS_TRUSTED_SIGNING_ENDPOINT -and
            [bool]$env:WINDOWS_TRUSTED_SIGNING_PUBLISHER_NAME -and
            [bool]$env:AZURE_TENANT_ID -and
            [bool]$env:AZURE_CLIENT_ID -and
            [bool]$env:AZURE_CLIENT_SECRET

          if ($hasPfxSigning -and $hasTrustedSigning) {
            throw "Configure exactly one Windows signing method for preview builds."
          }

          if (-not $hasPfxSigning -and -not $hasTrustedSigning) {
            throw "Signed preview builds require either WINDOWS_CSC_LINK/WINDOWS_CSC_KEY_PASSWORD or Azure Trusted Signing configuration."
          }

      - name: Build & package
        run: npm run build && npx electron-builder --config electron-builder.config.cjs --win --publish never

      - name: Verify Windows Authenticode signatures
        if: env.WINDOWS_REQUIRE_CODE_SIGNING == 'true'
        shell: pwsh
        run: |
          $files = New-Object System.Collections.Generic.List[System.IO.FileInfo]

          $setupFiles = Get-ChildItem dist -Filter *-setup.exe -File
          foreach ($file in $setupFiles) {
            $files.Add($file)
          }

          if (Test-Path dist\win-unpacked) {
            $peFiles = Get-ChildItem dist\win-unpacked -Recurse -Include *.exe,*.dll -File
            foreach ($file in $peFiles) {
              $files.Add($file)
            }
          }

          $uniqueFiles = $files | Sort-Object FullName -Unique
          if ($uniqueFiles.Count -eq 0) {
            throw "No Windows PE files were found to verify."
          }

          $invalidFiles = @()
          foreach ($file in $uniqueFiles) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($signature.Status -ne 'Valid') {
              $invalidFiles += "$($file.FullName) [$($signature.Status)]"
            }
          }

          if ($invalidFiles.Count -gt 0) {
            $invalidFiles | ForEach-Object { Write-Host $_ }
            throw "Unsigned or invalid PE files found in the Windows preview artifact."
          }

      - name: Generate checksums
        shell: pwsh
        run: |
          $setupFiles = Get-ChildItem dist -Filter *-setup.exe -File
          if ($setupFiles.Count -eq 0) {
            throw "No Windows setup executables were found in dist."
          }

          $checksums = foreach ($file in ($setupFiles | Sort-Object Name)) {
            $hash = Get-FileHash -Algorithm SHA256 -Path $file.FullName
            "{0} *{1}" -f $hash.Hash.ToLowerInvariant(), $file.Name
          }

          Set-Content -Path dist\SHASUMS256-win.txt -Value $checksums

      - uses: actions/upload-artifact@v4
        with:
          name: vessel-preview-windows
          retention-days: 14
          path: |
            dist/*-setup.exe
            dist/SHASUMS256-win.txt

  # ── Publish rolling preview ──
  publish-preview:
    if: github.ref == 'refs/heads/dev'
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: vessel-preview-linux
          path: dist-linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: vessel-preview-windows
          path: dist-windows

      - name: Publish rolling preview release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: edge
          target_commitish: ${{ github.sha }}
          name: Vessel Preview (dev)
          prerelease: true
          make_latest: false
          body: |
            Rolling preview build from `dev`.

            This prerelease is updated automatically on every push to `dev`.
          files: |
            dist-linux/*.AppImage
            dist-linux/SHASUMS256-linux.txt
            dist-windows/*-setup.exe
            dist-windows/SHASUMS256-win.txt
