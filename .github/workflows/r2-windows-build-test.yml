name: R2 Windows Build Test

on:
  workflow_dispatch:
    inputs:
      path_suffix:
        description: "Optional extra path under downloads/windows/test-builds"
        required: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build && npx electron-builder --win --publish never

      - name: Generate checksum
        shell: bash
        run: sha256sum dist/*-setup.exe > dist/SHASUMS256-win.txt

      - uses: actions/upload-artifact@v4
        with:
          name: r2-windows-build-test
          path: |
            dist/*-setup.exe
            dist/SHASUMS256-win.txt

  upload-r2:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          name: r2-windows-build-test
          path: dist-windows

      - name: Prepare upload paths
        env:
          PATH_SUFFIX_INPUT: ${{ github.event.inputs.path_suffix }}
        run: |
          set -euo pipefail

          prefix_root="downloads/windows/test-builds/${GITHUB_RUN_ID}"
          if [ -n "${PATH_SUFFIX_INPUT:-}" ]; then
            safe_suffix="${PATH_SUFFIX_INPUT#/}"
            safe_suffix="${safe_suffix%/}"
            prefix_root="${prefix_root}/${safe_suffix}"
          fi

          echo "prefix_root=$prefix_root" >> "$GITHUB_ENV"

      - name: Upload Windows build artifacts to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${R2_BUCKET:-}" ]; then
            echo "Missing Cloudflare R2 configuration."
            exit 1
          fi

          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          shopt -s nullglob
          windows_files=(dist-windows/*-setup.exe dist-windows/SHASUMS256-win.txt)
          if [ "${#windows_files[@]}" -eq 0 ]; then
            echo "No Windows artifacts found to upload."
            exit 1
          fi

          for file in "${windows_files[@]}"; do
            name="$(basename "$file")"
            aws s3 cp "$file" "s3://${R2_BUCKET}/${prefix_root}/${name}" --endpoint-url "$endpoint"
          done

      - name: Verify public URLs
        env:
          R2_PUBLIC_BASE_URL: ${{ vars.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${R2_PUBLIC_BASE_URL:-}" ]; then
            echo "Missing CLOUDFLARE_R2_PUBLIC_BASE_URL."
            exit 1
          fi

          base_url="${R2_PUBLIC_BASE_URL%/}"
          shopt -s nullglob
          windows_files=(dist-windows/*-setup.exe dist-windows/SHASUMS256-win.txt)
          user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"

          {
            echo "## R2 Windows Build Test"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          for file in "${windows_files[@]}"; do
            name="$(basename "$file")"
            public_url="${base_url}/${prefix_root}/${name}"
            status_code=""
            for attempt in 1 2 3 4 5 6; do
              status_code="$(curl -sS -L -A "$user_agent" -o "/tmp/$(basename "$file")" -w '%{http_code}' "$public_url")"
              if [ "$status_code" = "200" ]; then
                break
              fi
              echo "Attempt ${attempt} returned HTTP ${status_code} for ${public_url}; retrying..."
              sleep 10
            done
            if [ "$status_code" != "200" ]; then
              echo "Expected HTTP 200 from $public_url, got $status_code"
              curl -sSI -A "$user_agent" "$public_url" || true
              exit 1
            fi
            echo "- ${public_url}" >> "$GITHUB_STEP_SUMMARY"
          done
