name: Release Snap

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v1.2.3). Leave blank to mint the next patch version."
        required: false

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      ref: ${{ steps.version.outputs.ref }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag == '' && format('refs/heads/{0}', github.event.repository.default_branch) || github.ref }}

      - name: Determine snap release version
        id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="${INPUT_TAG#refs/tags/}"
            [[ "$tag" == v* ]] || tag="v$tag"
            version="${tag#v}"
          elif [[ "$GIT_REF" == refs/tags/v* ]]; then
            version="${GIT_REF#refs/tags/v}"
            tag="v$version"
          else
            pkg_version=$(node -p "require('./package.json').version")
            latest_patch=$(git tag --list "v${pkg_version%.*}.*" --sort=-version:refname | head -1 | sed 's/^v//')
            if [ -z "$latest_patch" ]; then
              version="$pkg_version"
            else
              major_minor="${latest_patch%.*}"
              patch="${latest_patch##*.}"
              version="${major_minor}.$((patch + 1))"
            fi
            tag="v$version"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"
          echo "Snap release version: $version"

      - name: Create tag if needed
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag == ''
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  snap:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: xvfb-run -a npm run smoke:test

      - name: Sync package metadata
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build electron app for snap
        run: npm run build && npx electron-builder --config electron-builder.config.cjs --linux dir --publish never

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft
        env:
          VESSEL_VERSION: ${{ needs.version.outputs.version }}

      - name: Upload to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          SNAP_PATH: ${{ steps.snapcraft.outputs.snap }}
        run: |
          snapcraft upload "$SNAP_PATH" --release=stable
