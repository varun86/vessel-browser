name: Release Snap

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3). Defaults to latest tag."
        required: false

jobs:
  snap:
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GITHUB_REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag=$(gh api "repos/${REPO}/tags?per_page=100" --paginate --jq '.[].name' | grep '^v' | sort -V | tail -n 1)
          fi
          tag="${tag#refs/tags/}"
          [[ "$tag" == v* ]] || tag="v$tag"
          version="${tag#v}"
          echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: xvfb-run -a npm run smoke:test

      - name: Sync package metadata
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft
        env:
          VESSEL_VERSION: ${{ steps.tag.outputs.version }}

      - name: Upload to Snap Store
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          SNAP_PATH: ${{ steps.snapcraft.outputs.snap }}
        run: |
          snapcraft upload "$SNAP_PATH" --release=stable
